<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Undertone — dictation dashboard</title>
    <meta
      name="description"
      content="Undertone dashboard — hold to talk in your browser and get polished text, with history and usage."
    />
    <script>
      // Paint the correct theme before first render — no flash. Same key as the marketing site.
      (function () {
        try {
          var stored = localStorage.getItem('undertone-theme');
          var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
          var theme =
            stored === 'light' || stored === 'dark' ? stored : prefersDark ? 'dark' : 'light';
          document.documentElement.setAttribute('data-theme', theme);
        } catch (e) {
          /* storage blocked — CSS media-query fallback handles it */
        }
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
  </head>
  <body>
    <div id="root"></div>
  </body>
</html>
